version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: plywood_mysql
    restart: always
    environment:
      MYSQL_DATABASE: plywood_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: payroll
      MYSQL_PASSWORD: payroll123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: