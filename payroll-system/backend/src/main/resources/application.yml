server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/plywood_db}
    username: ${SPRING_DATASOURCE_USERNAME:payroll}
    password: ${SPRING_DATASOURCE_PASSWORD:payroll123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  docker:
    compose:
      enabled: false

jwt:
  secret: aVeryLongAndSecretKeyForPlywoodPayrollSystem2026MustBeAtLeast256BitsLongSecurity
  expiration: 86400000

app:
  cors:
    allowed-origins: http://localhost:3000

# Swagger / OpenAPI Properties
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
