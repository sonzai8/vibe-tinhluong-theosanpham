server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/plywood_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:payroll}
    password: ${SPRING_DATASOURCE_PASSWORD:payroll123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  docker:
    compose:
      enabled: false

jwt:
  secret: aVeryLongAndSecretKeyFor_PlywoodPayrollSystem2026_MustBeAtLeast256BitsLong_Security
  expiration: 86400000

app:
  cors:
    allowed-origins: http://localhost:3000
